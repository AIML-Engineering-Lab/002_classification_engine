version: "3.9"

services:

  # ── FastAPI ML Backend ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      target: runner
    image: 002-classification-engine:api
    container_name: 002-classification-engine_api
    restart: unless-stopped
    environment:
      MODEL_PATH: /app/models/model.pkl
      LOG_LEVEL: info
    volumes:
      - ./models:/app/models:ro   # mount trained models read-only
    networks:
      - aiml_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    expose:
      - "8000"

  # ── React + Vite Frontend (built image) ──────────────────────────────────
  frontend:
    build:
      context: ./web/frontend
      dockerfile: Dockerfile.frontend
    image: 002-classification-engine:frontend
    container_name: 002-classification-engine_frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - aiml_net
    expose:
      - "80"

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: 002-classification-engine_nginx
    restart: unless-stopped
    ports:
      - "3000:80"      # Frontend accessible at http://localhost:3000
      - "8080:8080"    # API reverse-proxy at http://localhost:8080
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - aiml_net

networks:
  aiml_net:
    driver: bridge
